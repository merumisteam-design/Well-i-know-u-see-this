<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Повноекранне зображення</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .image-container {
      width: 100%;
      height: 100%;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* робить картинку на весь екран */
    }
  </style>
</head>
<body>
  <div class="image-container">
    <!-- Замінити src на свою картинку -->
    <img src="myimage.jpg" alt="Зображення">
  </div>
</body>
</html>
